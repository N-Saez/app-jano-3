# /etc/nginx/sites-available/pagina.cl.conf
# Copiar a /etc/nginx/sites-available/ y hacer symlink en sites-enabled/

server {
    listen 80;
    server_name pagina.cl www.pagina.cl;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pagina.cl www.pagina.cl;

    ssl_certificate     /etc/letsencrypt/live/pagina.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pagina.cl/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    client_max_body_size 110M;

    # Portal FastAPI (raíz)
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Fragmentos de apps (generados automáticamente por deployer.py)
    include /opt/streamlit-platform/nginx/locations.d/*.conf;
}
